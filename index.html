        }));
        const byName = new Map(FALLBACK.map((x) => [x.name.toLowerCase(), x]));
        const merged = live.map((x) => {
          const fb = byName.get(x.name.toLowerCase());
          return fb ? { ...x, ...fb, img: x.img } : x;
        });
        setData(merged);
        setSelected(merged.find((x) => x.name === "Shelly") || merged[0]);
        setSource("live");
      } catch (e) { /* keep fallback silently */ }
    })();
    return () => { dead = true; };
  }, []);

  const matches = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    return data
      .filter((b) => b.name.toLowerCase().includes(q))
      .sort((a, b) => {
        const ai = a.name.toLowerCase().indexOf(q);
        const bi = b.name.toLowerCase().indexOf(q);
        return ai - bi || a.name.localeCompare(b.name);
      })
      .slice(0, 8);
  }, [query, data]);

  function pick(b) {
    setSelected(b);
    setQuery("");
    setShowDrop(false);
    setHighlight(0);
    inputRef.current?.blur();
  }

  function onKey(e) {
    if (!showDrop || !matches.length) return;
    if (e.key === "ArrowDown") { e.preventDefault(); setHighlight((h) => (h + 1) % matches.length); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setHighlight((h) => (h - 1 + matches.length) % matches.length); }
    else if (e.key === "Enter") { e.preventDefault(); pick(matches[highlight]); }
    else if (e.key === "Escape") { setShowDrop(false); }
  }

  return (
    <div style={{ fontFamily: "'Outfit', system-ui, sans-serif" }}
         className="min-h-screen w-full text-amber-50 relative overflow-hidden">
      <div className="absolute inset-0 -z-10"
           style={{ background: "radial-gradient(1200px 700px at 15% -10%, #3b1d6f 0%, transparent 60%), radial-gradient(900px 600px at 110% 10%, #ff3d8a40 0%, transparent 55%), linear-gradient(180deg, #0d1438 0%, #1a0f3a 60%, #0d1438 100%)" }} />
      <div className="absolute inset-0 -z-10 opacity-[0.08] pointer-events-none"
           style={{ backgroundImage: "repeating-linear-gradient(45deg, #fff 0 1px, transparent 1px 14px)" }} />

      <header className="px-6 md:px-10 pt-8 md:pt-12 pb-4 max-w-6xl mx-auto">
        <div className="flex items-end gap-4 flex-wrap">
          <h1 className="leading-none"
              style={{ fontFamily: "'Lilita One', cursive", fontSize: "clamp(2.4rem, 6vw, 4.5rem)",
                       color: "#ffd23f", textShadow: "0 4px 0 #b8860b, 0 8px 24px #ffd23f55, 0 0 1px #000",
                       letterSpacing: "0.5px" }}>
            BRAWL CODEX
          </h1>
          <span className="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider"
                style={{ background: source === "live" ? "#21d44e" : "#ffd23f", color: "#0d1438" }}>
            {source === "live" ? "Live · Brawlify" : "Local Codex"}
          </span>
        </div>
        <p className="mt-2 text-amber-50/70 text-sm md:text-base max-w-2xl">
          Type a brawler's name. Hit enter. See every feature — stats, super, star powers, gadgets, hypercharge.
        </p>
      </header>

      <section className="px-6 md:px-10 max-w-6xl mx-auto relative">
        <div className="relative" onBlur={() => setTimeout(() => setShowDrop(false), 120)}>
          <div className="flex items-center gap-3 px-5 py-4 rounded-2xl border-2"
               style={{ background: "#0d1438cc", borderColor: "#ffd23f", boxShadow: "0 8px 0 #b8860b, 0 0 0 4px #0d143855" }}>
            <Search size={22} color="#ffd23f" />
            <input
              ref={inputRef}
              value={query}
              onChange={(e) => { setQuery(e.target.value); setShowDrop(true); setHighlight(0); }}
              onFocus={() => query && setShowDrop(true)}
              onKeyDown={onKey}
              placeholder="Try: Shelly, Mortis, Spike…"
              className="flex-1 bg-transparent outline-none text-lg md:text-xl placeholder-amber-50/40"
              style={{ fontWeight: 600, color: "#fff8e1" }}
            />
            {query && (
              <button onClick={() => { setQuery(""); inputRef.current?.focus(); }}
                      className="p-1 rounded-full hover:bg-white/10" aria-label="clear">
                <X size={18} color="#ffd23f" />
              </button>
            )}
          </div>

          {showDrop && matches.length > 0 && (
            <div className="absolute left-0 right-0 mt-2 rounded-2xl overflow-hidden z-20 border-2"
                 style={{ background: "#1a0f3aee", borderColor: "#ffd23f88", backdropFilter: "blur(8px)" }}>
              {matches.map((m, i) => {
                const r = RARITY_STYLE[m.rarity] || RARITY_STYLE.Starting;
                return (
                  <button key={m.name}
                          onMouseDown={(e) => { e.preventDefault(); pick(m); }}
                          onMouseEnter={() => setHighlight(i)}
                          className="w-full flex items-center gap-3 px-4 py-3 text-left transition-colors"
                          style={{ background: i === highlight ? "#ffd23f1a" : "transparent",
                                   borderLeft: `4px solid ${r.c}` }}>
                    <Avatar name={m.name} color={r.c} size={36} img={m.img} />
                    <div className="flex-1">
                      <div className="font-bold">{m.name}</div>
                      <div className="text-xs opacity-70">{m.rarity} · {m.role}</div>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
          {showDrop && query.trim() && matches.length === 0 && (
            <div className="absolute left-0 right-0 mt-2 px-4 py-3 rounded-2xl border-2"
                 style={{ background: "#1a0f3aee", borderColor: "#ff3d8a88" }}>
              <span className="text-amber-50/80">No brawler matches "<b>{query}</b>". Try another spelling.</span>
            </div>
          )}
        </div>

        <div className="mt-3 flex flex-wrap gap-2">
          {["Shelly","Colt","Mortis","Spike","Crow","Leon","Frank","Mandy","Cordelius","Pearl"]
            .filter((n) => data.find((b) => b.name === n))
            .map((n) => (
              <button key={n} onClick={() => pick(data.find((b) => b.name === n))}
                      className="text-xs px-3 py-1.5 rounded-full font-semibold transition-transform hover:-translate-y-0.5"
                      style={{ background: "#ffd23f1a", color: "#ffd23f", border: "1px solid #ffd23f55" }}>
                {n}
              </button>
            ))}
        </div>
      </section>

      <main className="px-6 md:px-10 max-w-6xl mx-auto pb-20 mt-8">
        <BrawlerCard b={selected} />
      </main>

      <footer className="px-6 md:px-10 max-w-6xl mx-auto pb-10 text-xs text-amber-50/40">
        Stats are approximate at Power Level 11 · Brawl Stars is a trademark of Supercell.
      </footer>
    </div>
  );
}

function BrawlerCard({ b }) {
  if (!b) return null;
  const r = RARITY_STYLE[b.rarity] || RARITY_STYLE.Starting;
  return (
    <article className="relative rounded-3xl border-2 overflow-hidden"
             style={{ background: "linear-gradient(180deg, #1a0f3acc 0%, #0d1438ee 100%)",
                      borderColor: r.c,
                      boxShadow: `0 0 0 4px #0d143855, 0 12px 40px ${r.glow}33, 0 6px 0 ${r.c}55` }}>
      <div className="p-6 md:p-8 flex items-start gap-5 md:gap-7"
           style={{ background: `radial-gradient(400px 300px at 0% 0%, ${r.c}22 0%, transparent 60%)` }}>
        <Avatar name={b.name} color={r.c} size={96} img={b.img} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="px-2.5 py-0.5 rounded-md text-[11px] font-bold uppercase tracking-wider"
                  style={{ background: r.c, color: "#0d1438" }}>{b.rarity}</span>
            <span className="px-2.5 py-0.5 rounded-md text-[11px] font-bold uppercase tracking-wider"
                  style={{ background: "#ffffff15", color: "#fff", border: "1px solid #ffffff30" }}>{b.role}</span>
          </div>
          <h2 className="mt-2 leading-none"
              style={{ fontFamily: "'Lilita One', cursive",
                       fontSize: "clamp(2rem, 5vw, 3.4rem)",
                       color: "#fff",
                       textShadow: `0 3px 0 ${r.c}, 0 6px 16px ${r.glow}66` }}>
            {b.name.toUpperCase()}
          </h2>
          <p className="mt-3 text-amber-50/85 max-w-2xl">{b.desc}</p>
        </div>
      </div>

      <div className="px-6 md:px-8 pb-2 grid grid-cols-2 md:grid-cols-4 gap-3">
        <Stat icon={<Heart size={18} />} label="Health" value={fmt(b.health)} color="#ff3d6e" />
        <Stat icon={<Swords size={18} />} label="Damage" value={fmt(b.damage)} color="#ff8a3d" />
        <Stat icon={<Crosshair size={18} />} label="Range" value={fmt(b.range)} color="#36b3ff" />
        <Stat icon={<Wind size={18} />} label="Speed" value={fmt(b.speed)} color="#21d44e" />
      </div>

      <Section icon={<Zap size={18} />} title="Super" accent="#ffd23f">
        <p className="text-amber-50/90">{b.sup || "—"}</p>
      </Section>

      {b.sp?.length > 0 && (
        <Section icon={<Star size={18} />} title="Star Powers" accent="#ffd23f">
          <div className="grid md:grid-cols-2 gap-3">
            {b.sp.map(([n, d]) => <Bullet key={n} title={n} body={d} accent="#ffd23f" />)}
          </div>
        </Section>
      )}

      {b.gd?.length > 0 && (
        <Section icon={<Wrench size={18} />} title="Gadgets" accent="#21d44e">
          <div className="grid md:grid-cols-2 gap-3">
            {b.gd.map(([n, d]) => <Bullet key={n} title={n} body={d} accent="#21d44e" />)}
          </div>
        </Section>
      )}

      {b.hc && (
        <Section icon={<Sparkles size={18} />} title="Hypercharge" accent="#ff3d8a">
          <Bullet title={b.hc[0]} body={b.hc[1]} accent="#ff3d8a" rainbow />
        </Section>
      )}
    </article>
  );
}

function Stat({ icon, label, value, color }) {
  return (
    <div className="rounded-xl px-4 py-3 border" style={{ background: "#ffffff08", borderColor: "#ffffff14" }}>
      <div className="flex items-center gap-2 text-xs uppercase tracking-wider opacity-80" style={{ color }}>
        {icon} {label}
      </div>
      <div className="mt-1 font-bold text-lg leading-tight" style={{ fontFamily: "'Lilita One', cursive", letterSpacing: "0.5px" }}>
        {value}
      </div>
    </div>
  );
}

function Section({ icon, title, accent, children }) {
  return (
    <section className="px-6 md:px-8 py-5 border-t" style={{ borderColor: "#ffffff14" }}>
      <h3 className="flex items-center gap-2 mb-3 uppercase tracking-wider text-sm"
          style={{ fontFamily: "'Lilita One', cursive", color: accent, letterSpacing: "1px" }}>
        <span style={{ color: accent }}>{icon}</span> {title}
      </h3>
      {children}
    </section>
  );
}

function Bullet({ title, body, accent, rainbow }) {
  return (
    <div className="rounded-xl p-3 pl-4 border-l-4"
         style={{
           background: rainbow ? "linear-gradient(90deg, #ff3d8a14, #ffd23f14, #36b3ff14)" : "#ffffff08",
           borderColor: accent
         }}>
      <div className="font-bold" style={{ color: "#fff" }}>{title}</div>
      <div className="text-sm opacity-85 mt-1">{body || "—"}</div>
    </div>
  );
}

function Avatar({ name, color, size, img }) {
  const [broken, setBroken] = useState(false);
  if (img && !broken) {
    return (
      <div className="rounded-2xl overflow-hidden flex-shrink-0"
           style={{ width: size, height: size, border: `3px solid ${color}`, background: "#0d1438" }}>
        <img src={img} alt={name} onError={() => setBroken(true)}
             style={{ width: "100%", height: "100%", objectFit: "cover" }} />
      </div>
    );
  }
  const letter = (name && name[0]) ? name[0].toUpperCase() : "?";
  return (
    <div className="rounded-2xl flex items-center justify-center flex-shrink-0 relative"
         style={{ width: size, height: size, background: `linear-gradient(135deg, ${color} 0%, ${color}aa 100%)`,
                  border: `3px solid #ffffff22`,
                  boxShadow: `inset 0 -6px 0 #00000033, 0 4px 0 ${color}88` }}>
      <span style={{ fontFamily: "'Lilita One', cursive", fontSize: size * 0.5, color: "#0d1438",
                     textShadow: "0 2px 0 #ffffff44" }}>
        {letter}
      </span>
    </div>
  );
}

function fmt(v) {
  if (v == null || v === "—") return "—";
  return String(v);
}

ReactDOM.createRoot(document.getElementById("root")).render(<BrawlCodex />);
</script>
</body>
</html>
